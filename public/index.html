<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WACRM — WhatsApp Marketing</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root{
    --green:#1fb35a;
    --green-dark:#0f8a45;
    --yellow:#ffe600;
    --blue:#2563eb;
    --purple:#7c3aed;
    --orange:#f97316;
    --pink:#ec4899;
    --indigo:#4f46e5;
    --bg:#f4f6f8;
    --card:#ffffff;
    --border:#e6e9ee;
    --text:#111827;
    --muted:#6b7280;
    --radius:14px;
    --shadow:0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}

  /* ===== Top promo banner ===== */
  .promo-top{
    display:flex;align-items:center;gap:16px;
    background:linear-gradient(90deg,#7ee8e8,#4fd1c5 30%,#a8e6a1 70%,#7ee8e8);
    padding:14px 24px;
  }
  .promo-badge{
    width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #35d16b, #0f8a3f 75%);
    display:flex;align-items:center;justify-content:center;
    border:3px solid #0f8a3f;flex-shrink:0;
  }
  .promo-badge svg{width:30px;height:30px;}
  .promo-text{
    flex:1;background:var(--yellow);border:3px solid var(--green-dark);
    border-radius:40px;padding:10px 28px;
    font-weight:900;font-size:26px;letter-spacing:1px;color:#0f8a3f;
    text-shadow:1px 1px 0 #fff;
  }

  /* ===== App shell ===== */
  .app{display:flex;min-height:70vh;}

  /* Sidebar */
  .sidebar{
    width:260px;background:#fff;border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;
  }
  .brand{
    display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--border);
  }
  .brand-icon{
    width:38px;height:38px;border-radius:8px;background:#111;display:flex;align-items:center;justify-content:center;
  }
  .brand-icon svg{width:20px;height:20px;}
  .brand-names{line-height:1.15;}
  .brand-names .tag{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.5px;}
  .brand-names .name{font-size:18px;font-weight:800;color:var(--green-dark);font-style:italic;}

  .nav{flex:1;overflow-y:auto;padding:8px;}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:10px 12px;margin:2px 4px;border-radius:10px;
    cursor:pointer;color:var(--text);
  }
  .nav-item:hover{background:#f2f4f7;}
  .nav-item.active{color:#fff;}
  .nav-item .ic{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .nav-item .labels{line-height:1.2;}
  .nav-item .labels .t1{font-weight:700;font-size:13.5px;}
  .nav-item .labels .t2{font-size:11px;opacity:.85;}

  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border);background:#fff;
  }
  .topbar .menu-btn{border:none;background:none;cursor:pointer;color:var(--muted);}
  .topbar .titles{margin-right:auto;}
  .topbar .titles h1{font-size:19px;margin:0;display:flex;align-items:center;gap:8px;}
  .topbar .titles p{margin:2px 0 0;font-size:12.5px;color:var(--muted);}
  .ver-pill{font-size:10px;background:#eef2ff;color:var(--indigo);padding:2px 8px;border-radius:20px;font-weight:700;}
  .search{
    display:flex;align-items:center;gap:8px;background:#f4f6f8;border:1px solid var(--border);
    border-radius:10px;padding:8px 12px;width:220px;color:var(--muted);font-size:13px;
  }
  .top-actions{display:flex;align-items:center;gap:12px;}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);}
  .icon-btn.accent{background:linear-gradient(135deg,#22d3ee,#3b82f6);border:none;color:#fff;}
  .demo-pill{font-size:12px;background:#f4f6f8;padding:6px 10px;border-radius:8px;display:flex;align-items:center;gap:8px;}
  .renew-btn{background:var(--blue);color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}

  .content{padding:22px 24px 40px;}
  .view{display:none;animation:fade .25s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;}
  @media(max-width:900px){.grid-stats{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .stat-card .label{font-size:12.5px;color:var(--muted);margin-bottom:6px;}
  .stat-card .value{font-size:26px;font-weight:800;margin-bottom:8px;}
  .stat-card .foot{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--green-dark);}

  .two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
  @media(max-width:900px){.two-col{grid-template-columns:1fr;}}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
  .panel h3{margin:0 0 14px;font-size:15px;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .link{color:var(--blue);font-size:12.5px;text-decoration:none;font-weight:600;cursor:pointer;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;color:var(--muted);text-align:center;gap:6px;}
  .empty-state svg{width:34px;height:34px;opacity:.4;margin-bottom:4px;}

  .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .quick-btn{
    border:none;border-radius:12px;padding:16px 10px;color:#fff;font-weight:700;font-size:12.5px;
    display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;text-align:center;
  }
  .quick-btn svg{width:20px;height:20px;}
  .qb-blue{background:var(--blue);} .qb-green{background:var(--green);} .qb-orange{background:var(--orange);}
  .qb-purple{background:var(--purple);} .qb-indigo{background:var(--indigo);} .qb-pink{background:var(--pink);}

  .page-head{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .page-head h2{margin:0;font-size:19px;display:flex;align-items:center;gap:8px;}
  .page-head p{margin:4px 0 0;color:var(--muted);font-size:13px;}
  .btn{border:none;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);}
  .btn-danger{background:#fee2e2;color:#dc2626;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-weight:700;font-size:11.5px;text-transform:uppercase;padding:10px 8px;border-bottom:1px solid var(--border);}
  td{padding:12px 8px;border-bottom:1px solid var(--border);}
  .badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
  .badge-green{background:#dcfce7;color:#15803d;}
  .badge-blue{background:#dbeafe;color:#1d4ed8;}
  .badge-gray{background:#f3f4f6;color:#4b5563;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
  .tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--blue);border-color:var(--blue);}

  .input, select.input{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:#fff;color:var(--text);
  }
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--text);}
  .toggle-group{display:flex;gap:8px;}
  .toggle-opt{flex:1;border:1px solid var(--border);border-radius:9px;padding:14px 8px;text-align:center;cursor:pointer;font-size:12.5px;font-weight:600;}
  .toggle-opt.active{border-color:var(--blue);background:#eff6ff;color:var(--blue);}

  .device-card{display:flex;align-items:center;justify-content:space-between;padding:14px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;}
  .device-left{display:flex;align-items:center;gap:12px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#22c55e;}

  .cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:900px){.cards-row{grid-template-columns:repeat(2,1fr);}}
  .mini-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;}
  .mini-card .label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .mini-card .value{font-size:22px;font-weight:800;margin-top:4px;}

  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:var(--muted);}
  .placeholder .ic{width:56px;height:56px;border-radius:16px;background:#eef2ff;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .placeholder h3{color:var(--text);margin:0 0 6px;}

  /* Bottom promo */
  .promo-bottom{
    display:flex;align-items:center;justify-content:center;gap:16px;
    background:linear-gradient(90deg,#7ee8e8,#4fd1c5 30%,#a8e6a1 70%,#7ee8e8);
    padding:18px 24px;flex-wrap:wrap;
  }
  .wa-icon{width:46px;height:46px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;border:3px solid #fff;}
  .promo-bottom .msg{background:#fff;border:2px solid #16a34a;border-radius:30px;padding:12px 26px;font-weight:900;font-size:20px;text-align:center;color:#1e3a5f;}
  .promo-bottom .msg .accent{color:#dc2626;}
  .promo-bottom .msg .accent2{color:#16a34a;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}
</style>
</head>
<body>

<!-- ===== TOP PROMO BANNER ===== -->
<div class="promo-top">

  <div class="promo-text">WHATSAPP MARKETING</div>

<div class="app">

  <!-- ===== MAIN ===== -->
  <main class="main">

      <div class="search">

        <div class="avatar">D</div>
      </div>
    </div>

    <div class="content" id="content"></div>
  </main>
</div>

<!-- ===== BOTTOM PROMO BANNER ===== -->
<div class="promo-bottom">
  <div class="wa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.06-1.32A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>

</div>

const navEl = document.getElementById('nav');
navItems.forEach(item=>{
  const el = document.createElement('div');
  el.className='nav-item'+(item.id==='panel'?' active':'');
  el.dataset.id=item.id;
  el.innerHTML = `<span class="ic">${item.icon}</span><span class="labels"><div class="t1">${item.t1}</div><div class="t2">${item.t2}</div></span>`;
  el.style.setProperty('--c', item.color);
  el.addEventListener('click',()=>selectNav(item));
  navEl.appendChild(el);
});

function selectNav(item){
  document.querySelectorAll('.nav-item').forEach(n=>{n.classList.remove('active');n.style.background='';n.style.color='';});
  const target = document.querySelector(`.nav-item[data-id="${item.id}"]`);
  target.classList.add('active');
  target.style.background = item.color;
  target.style.color = '#fff';
  document.getElementById('pageTitle').innerHTML = item.t1 + ' <span class="ver-pill">v1.0.9</span>';
  document.getElementById('pageSubtitle').innerText = item.t2;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const view = document.getElementById('view-'+item.id);
  if(view) view.classList.add('active');
}

}

      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;">Alertas de conexión <input type="checkbox" checked></div>
    </div>
  </div>
`);

function toggleTheme(el){
  el.parentElement.querySelectorAll('.toggle-opt').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
}

/* ============================================================
   CONEXIÓN REAL CON EL BACKEND (server.js) VÍA SOCKET.IO
   ============================================================ */
let waConnected = false;
let waNumber = null;
const socket = io();

socket.on('status', (data) => {
  waConnected = !!data.connected;
  waNumber = data.number || null;
  renderDeviceStatus();
  renderConnBanners();
});

socket.on('qr', (dataUrl) => {
  const img = document.getElementById('qrImg');
  const empty = document.getElementById('qrEmpty');
  if (img && empty) {
    img.src = dataUrl;
    img.style.display = 'inline-block';
    empty.style.display = 'none';
  }
});

socket.on('loading', (data) => {
  const empty = document.getElementById('qrEmpty');
  if (empty) {
    empty.innerHTML = `${ic.phone}<div>Cargando WhatsApp Web: ${data.percent}%</div><div style="font-size:12px">${data.message||''}</div>`;
    empty.style.display = 'flex';
  }
});

socket.on('backend-slow', (data) => {
  const empty = document.getElementById('qrEmpty');
  if (empty && !document.getElementById('qrImg').src.includes('data:image')) {
    empty.innerHTML = `${ic.clock}<div style="color:#b45309">⏳ Todavía iniciando...</div><div style="font-size:12px">${data.message}</div>`;
    empty.style.display = 'flex';
  }
});

socket.on('backend-error', (data) => {
  const empty = document.getElementById('qrEmpty');
  if (empty) {
    empty.innerHTML = `${ic.bell}<div style="color:#dc2626;font-weight:700">❌ Error del backend</div><div style="font-size:12px;color:#dc2626;max-width:260px;">${data.message}</div><div style="font-size:11.5px;margin-top:8px;color:var(--muted)">Revisa la terminal para más detalles y soluciones sugeridas.</div>`;
    empty.style.display = 'flex';
    document.getElementById('qrImg').style.display = 'none';
  }
});

function renderDeviceStatus(){
  const dot = document.getElementById('deviceDot');
  const label = document.getElementById('deviceLabel');
  const sub = document.getElementById('deviceSub');
  const badge = document.getElementById('deviceBadge');
  const logoutBtn = document.getElementById('logoutBtn');
  const qrImg = document.getElementById('qrImg');
  const qrEmpty = document.getElementById('qrEmpty');
  if(!dot) return; // vista no montada aún

  if (waConnected) {
    dot.style.background = '#22c55e';
    label.innerText = '01 · ' + (waNumber || 'Conectado');
    sub.innerText = 'Sesión activa — lista para enviar mensajes';
    badge.className = 'badge badge-green';
    badge.innerText = 'Conectado';
    logoutBtn.style.display = 'inline-flex';
    if(qrImg){ qrImg.style.display='none'; }
    if(qrEmpty){ qrEmpty.innerHTML = `${ic.phone}<div>WhatsApp conectado ✅</div>`; qrEmpty.style.display='flex'; }
  } else {
    dot.style.background = '#d1d5db';
    label.innerText = 'Sin conectar';
    sub.innerText = 'Escanea el código QR para vincular tu WhatsApp';
    badge.className = 'badge badge-gray';
    badge.innerText = 'Desconectado';
    logoutBtn.style.display = 'none';
  }
}

function renderConnBanners(){
  const banners = [document.getElementById('indivConnBanner'), document.getElementById('masivoConnBanner')];
  banners.forEach(b=>{
    if(!b) return;
    if (waConnected) {
      b.className = 'badge badge-green';
      b.innerText = '✅ WhatsApp conectado (' + (waNumber||'') + ')';
    } else {
      b.className = 'badge badge-gray';
      b.innerHTML = '⚠️ WhatsApp no conectado — ve a "Dispositivos" y escanea el QR';
    }
  });
}

// Botón cerrar sesión
document.addEventListener('click', async (e)=>{
  if(e.target && e.target.id === 'logoutBtn'){
    e.target.disabled = true;
    e.target.innerText = 'Cerrando sesión...';
    try{ await fetch('/api/logout', {method:'POST'}); }catch(err){}
  }
});

// Envío individual real
document.addEventListener('click', async (e)=>{
  if(e.target && e.target.id === 'indivSendBtn'){
    const number = document.getElementById('indivNumber').value.trim();
    const message = document.getElementById('indivMessage').value.trim();
    const resultEl = document.getElementById('indivResult');
    if(!number || !message){ resultEl.innerHTML = '<span style="color:#dc2626">Completa número y mensaje.</span>'; return; }

    e.target.disabled = true;
    e.target.innerText = 'Enviando...';
    resultEl.innerHTML = '';
    try{
      const res = await fetch('/api/send-message', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({number, message})
      });
      const data = await res.json();
      if(res.ok){
        resultEl.innerHTML = '<span style="color:#16a34a">✅ Mensaje enviado correctamente a '+number+'</span>';
        document.getElementById('indivMessage').value = '';
      } else {
        resultEl.innerHTML = '<span style="color:#dc2626">❌ '+(data.error||'Error al enviar')+'</span>';
      }
    }catch(err){
      resultEl.innerHTML = '<span style="color:#dc2626">❌ No se pudo conectar con el servidor backend (¿está corriendo server.js?)</span>';
    }
    e.target.disabled = false;
    e.target.innerHTML = `${ic.send} Enviar Mensaje`;
  }
});

// Envío masivo real con progreso en vivo
document.addEventListener('click', async (e)=>{
  if(e.target && e.target.id === 'masivoSendBtn'){
    const raw = document.getElementById('masivoNumbers').value.trim();
    const message = document.getElementById('masivoMessage').value.trim();
    const minDelay = parseFloat(document.getElementById('masivoMin').value) || 3;
    const maxDelay = parseFloat(document.getElementById('masivoMax').value) || 9;
    const numbers = raw.split('\n').map(n=>n.trim()).filter(Boolean);

    if(numbers.length === 0 || !message){
      alert('Agrega al menos un número y un mensaje.');
      return;
    }

    e.target.disabled = true;
    e.target.innerText = 'Enviando...';
    document.getElementById('masivoLog').innerHTML = '';
    document.getElementById('masivoBar').style.width = '0%';
    document.getElementById('masivoSummary').innerText = `0 enviados · 0 fallidos · 0/${numbers.length}`;

    try{
      const res = await fetch('/api/send-bulk', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({numbers, message, minDelay, maxDelay})
      });
      const data = await res.json();
      if(!res.ok){
        alert(data.error || 'Error al iniciar el envío masivo');
        e.target.disabled = false;
        e.target.innerHTML = `${ic.send} Iniciar Envío Masivo`;
      }
    }catch(err){
      alert('No se pudo conectar con el servidor backend (¿está corriendo server.js?)');
      e.target.disabled = false;
      e.target.innerHTML = `${ic.send} Iniciar Envío Masivo`;
    }
  }
});

socket.on('bulk-progress', (p)=>{
  const bar = document.getElementById('masivoBar');
  const summary = document.getElementById('masivoSummary');
  const log = document.getElementById('masivoLog');
  if(!bar) return;
  const pct = Math.round(((p.sent + p.failed) / p.total) * 100);
  bar.style.width = pct + '%';
  summary.innerText = `${p.sent} enviados · ${p.failed} fallidos · ${p.sent+p.failed}/${p.total}`;
  const line = document.createElement('div');
  line.style.padding = '4px 0';
  line.innerHTML = p.status === 'sent'
    ? `<span style="color:#16a34a">✔ ${p.number} — enviado</span>`
    : `<span style="color:#dc2626">✘ ${p.number} — ${p.error||'falló'}</span>`;
  log.prepend(line);
});

socket.on('bulk-done', (summary)=>{
  const btn = document.getElementById('masivoSendBtn');
  if(btn){ btn.disabled = false; btn.innerHTML = `${ic.send} Iniciar Envío Masivo`; }
  alert(`Envío masivo terminado: ${summary.sent} enviados, ${summary.failed} fallidos.`);
});

// Al abrir la app, pintar estado inicial si ya llegó
renderDeviceStatus();
renderConnBanners();
</script>
</body>
</html>
