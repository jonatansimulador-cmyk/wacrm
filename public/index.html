<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WACRM — WhatsApp Marketing</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root{
    --green:#1fb35a;
    --green-dark:#0f8a45;
    --yellow:#ffe600;
    --blue:#2563eb;
    --purple:#7c3aed;
    --orange:#f97316;
    --pink:#ec4899;
    --indigo:#4f46e5;
    --bg:#f4f6f8;
    --card:#ffffff;
    --border:#e6e9ee;
    --text:#111827;
    --muted:#6b7280;
    --radius:14px;
    --shadow:0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}

  /* ===== Top promo banner ===== */
  .promo-top{
    display:flex;align-items:center;gap:16px;
    background:linear-gradient(90deg,#7ee8e8,#4fd1c5 30%,#a8e6a1 70%,#7ee8e8);
    padding:14px 24px;
  }
  .promo-badge{
    width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #35d16b, #0f8a3f 75%);
    display:flex;align-items:center;justify-content:center;
    border:3px solid #0f8a3f;flex-shrink:0;
  }
  .promo-badge svg{width:30px;height:30px;}
  .promo-text{
    flex:1;background:var(--yellow);border:3px solid var(--green-dark);
    border-radius:40px;padding:10px 28px;
    font-weight:900;font-size:26px;letter-spacing:1px;color:#0f8a3f;
    text-shadow:1px 1px 0 #fff;
  }

  /* ===== App shell ===== */
  .app{display:flex;min-height:70vh;}

  /* Sidebar */
  .sidebar{
    width:260px;background:#fff;border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;
  }
  .brand{
    display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--border);
  }
  .brand-icon{
    width:38px;height:38px;border-radius:8px;background:#111;display:flex;align-items:center;justify-content:center;
  }
  .brand-icon svg{width:20px;height:20px;}
  .brand-names{line-height:1.15;}
  .brand-names .tag{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.5px;}
  .brand-names .name{font-size:18px;font-weight:800;color:var(--green-dark);font-style:italic;}

  .nav{flex:1;overflow-y:auto;padding:8px;}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:10px 12px;margin:2px 4px;border-radius:10px;
    cursor:pointer;color:var(--text);
  }
  .nav-item:hover{background:#f2f4f7;}
  .nav-item.active{color:#fff;}
  .nav-item .ic{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .nav-item .labels{line-height:1.2;}
  .nav-item .labels .t1{font-weight:700;font-size:13.5px;}
  .nav-item .labels .t2{font-size:11px;opacity:.85;}

  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border);background:#fff;
  }
  .topbar .menu-btn{border:none;background:none;cursor:pointer;color:var(--muted);}
  .topbar .titles{margin-right:auto;}
  .topbar .titles h1{font-size:19px;margin:0;display:flex;align-items:center;gap:8px;}
  .topbar .titles p{margin:2px 0 0;font-size:12.5px;color:var(--muted);}
  .ver-pill{font-size:10px;background:#eef2ff;color:var(--indigo);padding:2px 8px;border-radius:20px;font-weight:700;}
  .search{
    display:flex;align-items:center;gap:8px;background:#f4f6f8;border:1px solid var(--border);
    border-radius:10px;padding:8px 12px;width:220px;color:var(--muted);font-size:13px;
  }
  .top-actions{display:flex;align-items:center;gap:12px;}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);}
  .icon-btn.accent{background:linear-gradient(135deg,#22d3ee,#3b82f6);border:none;color:#fff;}
  .demo-pill{font-size:12px;background:#f4f6f8;padding:6px 10px;border-radius:8px;display:flex;align-items:center;gap:8px;}
  .renew-btn{background:var(--blue);color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}

  .content{padding:22px 24px 40px;}
  .view{display:none;animation:fade .25s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;}
  @media(max-width:900px){.grid-stats{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .stat-card .label{font-size:12.5px;color:var(--muted);margin-bottom:6px;}
  .stat-card .value{font-size:26px;font-weight:800;margin-bottom:8px;}
  .stat-card .foot{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--green-dark);}

  .two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
  @media(max-width:900px){.two-col{grid-template-columns:1fr;}}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
  .panel h3{margin:0 0 14px;font-size:15px;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .link{color:var(--blue);font-size:12.5px;text-decoration:none;font-weight:600;cursor:pointer;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;color:var(--muted);text-align:center;gap:6px;}
  .empty-state svg{width:34px;height:34px;opacity:.4;margin-bottom:4px;}

  .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .quick-btn{
    border:none;border-radius:12px;padding:16px 10px;color:#fff;font-weight:700;font-size:12.5px;
    display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;text-align:center;
  }
  .quick-btn svg{width:20px;height:20px;}
  .qb-blue{background:var(--blue);} .qb-green{background:var(--green);} .qb-orange{background:var(--orange);}
  .qb-purple{background:var(--purple);} .qb-indigo{background:var(--indigo);} .qb-pink{background:var(--pink);}

  .page-head{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .page-head h2{margin:0;font-size:19px;display:flex;align-items:center;gap:8px;}
  .page-head p{margin:4px 0 0;color:var(--muted);font-size:13px;}
  .btn{border:none;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);}
  .btn-danger{background:#fee2e2;color:#dc2626;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-weight:700;font-size:11.5px;text-transform:uppercase;padding:10px 8px;border-bottom:1px solid var(--border);}
  td{padding:12px 8px;border-bottom:1px solid var(--border);}
  .badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
  .badge-green{background:#dcfce7;color:#15803d;}
  .badge-blue{background:#dbeafe;color:#1d4ed8;}
  .badge-gray{background:#f3f4f6;color:#4b5563;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
  .tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--blue);border-color:var(--blue);}

  .input, select.input{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:#fff;color:var(--text);
  }
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--text);}
  .toggle-group{display:flex;gap:8px;}
  .toggle-opt{flex:1;border:1px solid var(--border);border-radius:9px;padding:14px 8px;text-align:center;cursor:pointer;font-size:12.5px;font-weight:600;}
  .toggle-opt.active{border-color:var(--blue);background:#eff6ff;color:var(--blue);}

  .device-card{display:flex;align-items:center;justify-content:space-between;padding:14px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;}
  .device-left{display:flex;align-items:center;gap:12px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#22c55e;}

  .cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:900px){.cards-row{grid-template-columns:repeat(2,1fr);}}
  .mini-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;}
  .mini-card .label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .mini-card .value{font-size:22px;font-weight:800;margin-top:4px;}

  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:var(--muted);}
  .placeholder .ic{width:56px;height:56px;border-radius:16px;background:#eef2ff;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .placeholder h3{color:var(--text);margin:0 0 6px;}

  /* Bottom promo */
  .promo-bottom{
    display:flex;align-items:center;justify-content:center;gap:16px;
    background:linear-gradient(90deg,#7ee8e8,#4fd1c5 30%,#a8e6a1 70%,#7ee8e8);
    padding:18px 24px;flex-wrap:wrap;
  }
  .wa-icon{width:46px;height:46px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;border:3px solid #fff;}
  .promo-bottom .msg{background:#fff;border:2px solid #16a34a;border-radius:30px;padding:12px 26px;font-weight:900;font-size:20px;text-align:center;color:#1e3a5f;}
  .promo-bottom .msg .accent{color:#dc2626;}
  .promo-bottom .msg .accent2{color:#16a34a;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}
</style>
</head>
<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div id="loginOverlay" style="position:fixed;inset:0;background:#f4f6f8;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid var(--border);border-radius:16px;padding:32px;width:320px;box-shadow:var(--shadow);">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <div style="width:38px;height:38px;border-radius:8px;background:#111;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.06-1.32A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#25D366"/></svg>
      </div>
      <div><div style="font-size:10px;font-weight:700;color:var(--orange);">AUTOMATIZA, VENDE Y CRECE</div><div style="font-size:18px;font-weight:800;color:var(--green-dark);font-style:italic;">WACRM</div></div>
    </div>
    <div class="field"><label>Usuario</label><input class="input" id="loginUsername" placeholder="usuario"></div>
    <div class="field"><label>Contraseña</label><input class="input" id="loginPassword" type="password" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center;">Ingresar</button>
    <div id="loginError" style="color:#dc2626;font-size:12.5px;margin-top:10px;"></div>
  </div>
</div>

<div id="appRoot" style="display:none;">

<!-- ===== TOP PROMO BANNER ===== -->
<div class="promo-top">
  <div class="promo-badge">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.06-1.32A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#fff"/><path d="M12 6.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM12 11a1.5 1.5 0 00-1.5 1.5V16a1.5 1.5 0 003 0v-3.5A1.5 1.5 0 0012 11z" fill="#0f8a3f"/></svg>
  </div>
  <div class="promo-text">WHATSAPP MARKETING</div>
</div>

<div class="app">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.06-1.32A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#25D366"/></svg>
      </div>
      <div class="brand-names">
        <div class="tag">AUTOMATIZA, VENDE Y CRECE</div>
        <div class="name">WACRM</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="topbar">
      <button class="menu-btn" title="Menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="titles">
        <h1 id="pageTitle">Panel de Control <span class="ver-pill">v1.0.9</span></h1>
        <p id="pageSubtitle">Resumen de tus actividades de automatización de WhatsApp</p>
      </div>
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Buscar...
      </div>
      <div class="top-actions">
        <button class="icon-btn" title="Tema"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
        <button class="icon-btn accent" title="Boost"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg></button>
        <button class="icon-btn" title="Notificaciones"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></button>
        <div class="demo-pill" id="userPill">Demo <button class="renew-btn" id="logoutUserBtn">Salir</button></div>
        <div class="avatar" id="userAvatar">D</div>
      </div>
    </div>

    <div class="content" id="content"></div>
  </main>
</div>

<!-- ===== BOTTOM PROMO BANNER ===== -->
<div class="promo-bottom">
  <div class="wa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.06-1.32A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>
  <div class="msg">ENVÍA <span class="accent">MENSAJES MASIVOS</span><br>ILIMITADOS POR <span class="accent2">WHATSAPP</span></div>
  <div class="wa-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.06-1.32A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>
</div>

</div><!-- /#appRoot -->

<script>
/* ============ ICONS (simple inline SVG paths) ============ */

  clock:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',

  extract:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',

const navEl = document.getElementById('nav');
function buildNav(role){
  navEl.innerHTML = '';
  navItems.forEach(item=>{
    if(item.adminOnly && role !== 'admin') return;
    if(role === 'asesor' && !item.asesorAllowed) return;
    const el = document.createElement('div');
    el.className='nav-item'+(item.id==='panel'?' active':'');
    el.dataset.id=item.id;
    el.innerHTML = `<span class="ic">${item.icon}</span><span class="labels"><div class="t1">${item.t1}</div><div class="t2">${item.t2}</div></span>`;
    el.style.setProperty('--c', item.color);
    el.addEventListener('click',()=>selectNav(item));
    navEl.appendChild(el);
  });
}

function selectNav(item){
  document.querySelectorAll('.nav-item').forEach(n=>{n.classList.remove('active');n.style.background='';n.style.color='';});
  const target = document.querySelector(`.nav-item[data-id="${item.id}"]`);
  if(target){
    target.classList.add('active');
    target.style.background = item.color;
    target.style.color = '#fff';
  }
  document.getElementById('pageTitle').innerHTML = item.t1 + ' <span class="ver-pill">v1.0.9</span>';
  document.getElementById('pageSubtitle').innerText = item.t2;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const view = document.getElementById('view-'+item.id);
  if(view) view.classList.add('active');
  if(item.id === 'autoresp' && typeof loadAutoresponderStatus === 'function') loadAutoresponderStatus();
  if(item.id === 'conversaciones' && typeof loadConvoList === 'function') loadConvoList();
  if(item.id === 'usuarios' && typeof loadUsersList === 'function') loadUsersList();
}

}

/* ---- Sonido de notificación (generado, sin archivos externos) ---- */
let audioCtx = null;
function playNotificationSound(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    [0, 0.15].forEach((delay, i)=>{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = i === 0 ? 880 : 1046;
      gain.gain.setValueAtTime(0.0001, now + delay);
      gain.gain.exponentialRampToValueAtTime(0.25, now + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.28);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now + delay); osc.stop(now + delay + 0.3);
    });
  }catch(e){}
}

function ensureToastContainer(){

  toast.addEventListener('click', ()=>{
    const convoNav = navItems.find(n=>n.id==='conversaciones');
    if(convoNav) selectNav(convoNav);
    openConvo(c.number);

}

function fmtNumber(n){ return n.replace('@c.us',''); }
function fmtTime(ts){ return ts ? new Date(ts).toLocaleString('es-PE',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}) : ''; }

function computeSemaphore(c){
  // Verde: ya se respondió (o el bot está gestionando). Naranja/Rojo: el cliente espera respuesta.
  if(!c.lastMessage || c.lastMessage.from !== 'cliente'){
    return {color:'#22c55e', label:'Al día'};
  }
  const waitedMin = (Date.now() - c.lastMessage.at) / 60000;
  if(waitedMin >= 10) return {color:'#dc2626', label:'Esperando '+Math.floor(waitedMin)+' min'};
  if(waitedMin >= 5) return {color:'#f59e0b', label:'Esperando '+Math.floor(waitedMin)+' min'};
  return {color:'#22c55e', label:'Esperando '+Math.floor(waitedMin)+' min'};
}
function semaphoreDot(c){
  const s = computeSemaphore(c);
  return `<span title="${s.label}" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0;"></span>`;
}

async function loadConvoList(){
  const listEl = document.getElementById('convoList');
  if(!listEl) return;
  try{
    const res = await fetch('/api/conversations');
    const list = await res.json();

    // Detectar mensajes nuevos del cliente para notificar (sonido + alerta)
    list.forEach(c=>{
      const prev = knownMessageCounts[c.number];
      if(prev !== undefined && c.messageCount > prev && c.lastMessage && c.lastMessage.from === 'cliente'){
        notifyNewMessage(c);
      }
      knownMessageCounts[c.number] = c.messageCount;
    });
    updateUnreadBadge();

    if(list.length === 0){
      listEl.innerHTML = `<div class="empty-state" style="padding:30px 16px;">${ic.chat}<div>Sin conversaciones todavía</div><div style="font-size:12px">Aparecerán aquí cuando un cliente escriba por primera vez</div></div>`;
      return;
    }
    listEl.innerHTML = list.map(c => `
      <div class="convo-item" data-number="${c.number}" style="padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;${selectedConvoNumber===c.number?'background:#eff6ff;':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;">
          <div style="display:flex;align-items:center;gap:8px;min-width:0;">
            ${semaphoreDot(c)}
            <b style="font-size:15px;white-space:nowrap;">${fmtNumber(c.number)}</b>
            ${unreadConvos.has(c.number) ? '<span style="width:8px;height:8px;border-radius:50%;background:#2563eb;flex-shrink:0;"></span>' : ''}
          </div>
          ${statusBadge(c.status)}
        </div>
        <div style="font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.lastMessage ? (c.lastMessage.from==='cliente'?'':'Tú: ')+c.lastMessage.text : ''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">${fmtTime(c.updatedAt)} · ${c.messageCount} mensajes${c.data.dni?' · DNI: '+c.data.dni:''}${c.assignedName?' · 👤 '+c.assignedName:''}</div>
      </div>
    `).join('');
    listEl.querySelectorAll('.convo-item').forEach(el=>{
      el.addEventListener('click', ()=> openConvo(el.dataset.number));
    });
  }catch(e){
    listEl.innerHTML = `<div class="empty-state" style="padding:30px 16px;color:#dc2626;">No se pudo conectar con el servidor.</div>`;
  }
}

async function openConvo(number){
  selectedConvoNumber = number;
  unreadConvos.delete(number);
  updateUnreadBadge();
  loadConvoList();
  const panel = document.getElementById('convoDetailPanel');
  panel.innerHTML = `<div class="empty-state">${ic.clock}<div>Cargando...</div></div>`;
  try{
    const res = await fetch('/api/conversations/' + encodeURIComponent(number));
    const c = await res.json();
    renderConvoDetail(c);
  }catch(e){
    panel.innerHTML = `<div class="empty-state" style="color:#dc2626;">No se pudo cargar la conversación.</div>`;
  }
}

async function renderConvoDetail(c){
  const panel = document.getElementById('convoDetailPanel');
  c.lastMessage = c.messages && c.messages.length ? c.messages[c.messages.length - 1] : null;
  const dataRows = `
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:12.5px;">
      <div><b>DNI:</b> ${c.data.dni || '—'}</div>
      <div><b>Modalidad:</b> ${c.data.paymentOption || '—'}</div>
      <div><b>Monto disponible:</b> ${c.data.budget || '—'}</div>
    </div>`;

  let assignRow = '';
  if(currentUser && currentUser.role === 'admin'){
    let options = '<option value="">Sin asignar</option>';
    try{
      const res = await fetch('/api/users');
      const list = await res.json();
      options += list.filter(u=>u.role==='asesor').map(u=>
        `<option value="${u.username}" ${c.assignedTo===u.username?'selected':''}>${u.name}</option>`
      ).join('');
    }catch(e){}
    assignRow = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <label style="font-size:12.5px;font-weight:600;">Asignar a:</label>
        <select class="input" id="assignSelect" style="max-width:220px;">${options}</select>
      </div>`;
  } else if(c.assignedName){
    assignRow = `<div style="margin-bottom:14px;"><span class="badge badge-blue">👤 Asignado a: ${c.assignedName}</span></div>`;
  }

  const messagesHtml = c.messages.map(m => {
    const mine = m.from !== 'cliente';
    const label = m.from === 'bot' ? '🤖 Bot' : m.from === 'asesor' ? '👤 ' + (m.by || 'Asesor') : '';
    return `<div style="display:flex;justify-content:${mine?'flex-end':'flex-start'};margin-bottom:8px;">
      <div style="max-width:75%;padding:8px 12px;border-radius:10px;background:${mine?'#dbeafe':'#f3f4f6'};font-size:13px;">
        ${label ? `<div style="font-size:10.5px;color:var(--muted);margin-bottom:2px;">${label}</div>` : ''}
        ${m.text}
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;">${semaphoreDot(c)}<b style="font-size:16px;">${fmtNumber(c.number)}</b> ${statusBadge(c.status)}</div>
      <div style="display:flex;gap:8px;">
        ${c.status !== 'human'
          ? `<button class="btn btn-outline" id="takeoverBtn">Tomar conversación</button>`
          : `<button class="btn btn-outline" id="resumeBotBtn">Reactivar bot</button>`}
      </div>
    </div>
    ${assignRow}
    ${dataRows}
    <div style="border-top:1px solid var(--border);padding-top:12px;max-height:340px;overflow-y:auto;margin-bottom:12px;" id="convoMessages">${messagesHtml}</div>
    <div style="display:flex;gap:8px;">
      <input class="input" id="convoReplyInput" placeholder="Escribe una respuesta como asesor...">
      <button class="btn btn-primary" id="convoReplyBtn">${ic.send}</button>
    </div>
  `;

  const msgsEl = document.getElementById('convoMessages');
  if(msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;

  const assignSelect = document.getElementById('assignSelect');
  if(assignSelect) assignSelect.addEventListener('change', async ()=>{
    await fetch(`/api/conversations/${encodeURIComponent(c.number)}/assign`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username: assignSelect.value || null})
    });
    openConvo(c.number);
  });

  const takeoverBtn = document.getElementById('takeoverBtn');
  if(takeoverBtn) takeoverBtn.onclick = async ()=>{
    await fetch(`/api/conversations/${encodeURIComponent(c.number)}/takeover`, {method:'POST'});
    openConvo(c.number);
  };
  const resumeBtn = document.getElementById('resumeBotBtn');
  if(resumeBtn) resumeBtn.onclick = async ()=>{
    await fetch(`/api/conversations/${encodeURIComponent(c.number)}/resume-bot`, {method:'POST'});
    openConvo(c.number);
  };
  const replyBtn = document.getElementById('convoReplyBtn');
  const replyInput = document.getElementById('convoReplyInput');
  const sendReply = async ()=>{
    const message = replyInput.value.trim();
    if(!message) return;
    replyBtn.disabled = true;
    try{
      await fetch(`/api/conversations/${encodeURIComponent(c.number)}/reply`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message})
      });
      replyInput.value = '';
      openConvo(c.number);
    }catch(e){}
    replyBtn.disabled = false;
  };
  if(replyBtn) replyBtn.onclick = sendReply;
  if(replyInput) replyInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendReply(); });
}

document.addEventListener('click', (e)=>{
  if(e.target && e.target.id === 'refreshConvos') loadConvoList();
});

socket.on('conversation-update', (summary)=>{
  if(!summary) return;
  loadConvoList();
  if(selectedConvoNumber === summary.number) openConvo(summary.number);
});

// Arrancar: revisar si ya hay sesión activa, o mostrar login
checkSession();

</script>
</body>
</html>
